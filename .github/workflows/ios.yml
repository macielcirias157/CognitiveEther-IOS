name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Generate Project
      run: xcodegen generate
      
    - name: Build App
      run: |
        xcodebuild build \
          -project CognitiveEther.xcodeproj \
          -scheme CognitiveEther \
          -sdk iphoneos \
          -configuration Release \
          -arch arm64 \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          ENTITLEMENTS_REQUIRED=NO \
          IPHONEOS_DEPLOYMENT_TARGET=16.0 \
          CONFIGURATION_BUILD_DIR=build/Release-iphoneos \
          GENERATE_INFOPLIST_FILE=YES \
          MARKETING_VERSION=1.0 \
          CURRENT_PROJECT_VERSION=1 \
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
          OTHER_SWIFT_FLAGS="-Xfrontend -serialize-debugging-options" \
          ENABLE_PREVIEWS=NO \
          COMPILER_INDEX_STORE_ENABLE=NO
          
    - name: Create IPA
      run: |
        mkdir -p build/Payload
        cp -r build/Release-iphoneos/CognitiveEther.app build/Payload/
        mkdir -p output
        cd build && zip -r ../output/CognitiveEther.ipa Payload
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CognitiveEther-IPA
        path: output/CognitiveEther.ipa
